name: E2E Railway

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  unit-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run typecheck
        run: pnpm typecheck

      - name: Run unit tests
        run: pnpm test:unit

      - name: Run contract tests
        run: pnpm test:contract

      - name: Build
        run: pnpm build

  e2e-railway:
    needs: unit-contract
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      E2E_REPORT_PATH: tests/e2e/artifacts/e2e-report.json
      E2E_LOG_PATH: tests/e2e/artifacts/mcp-stderr.log
      E2E_CLEANUP_PENDING_PATH: tests/e2e/artifacts/cleanup-pending.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Validate Railway token
        run: test -n "$RAILWAY_TOKEN"

      - name: Run Railway E2E
        run: pnpm test:e2e:railway

      - name: Force cleanup (always)
        if: always()
        run: node tests/e2e/force-cleanup.mjs

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: railway-e2e-artifacts-${{ github.run_id }}
          path: tests/e2e/artifacts
          if-no-files-found: warn
